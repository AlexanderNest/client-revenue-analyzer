services:
  redis:
    image: redis:7.2-alpine
    container_name: redis-bot
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass "your_strong_password"

  db:
    image: postgres:16-alpine
    container_name: client-revenue-analyzer
    ports:
      - "5432:5432"

    environment:
      - POSTGRES_USER=clientAnalyzer
      - POSTGRES_PASSWORD=clientAnalyzer
      - POSTGRES_DB=clientAnalyzer
    volumes:
      - pgdata:/var/lib/postgresql/data


  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.10.1
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    networks:
      - elk

  logstash:
    image: docker.elastic.co/logstash/logstash:7.10.1
    ports:
      - "5044:5044"
    volumes:
      - ./logstash.conf:/usr/share/logstash/pipeline/logstash.conf
    networks:
      - elk
    depends_on:
      - elasticsearch

  kibana:
    image: docker.elastic.co/kibana/kibana:7.10.1
    ports:
      - "5601:5601"
    networks:
      - elk
    depends_on:
      - elasticsearch
networks:
  elk:

volumes:
  pgdata:
